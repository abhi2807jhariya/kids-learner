<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Geometry Learning</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/geometric.css">
</head>
<body class="geometry-page h-[100dvh] overflow-hidden flex flex-col">
  <div id="header"></div>
  <main class="geometry-main page-scroll flex-1 min-h-0 overflow-y-auto overflow-x-hidden px-3 sm:px-5 py-7 sm:py-9 pb-16">
    <h1 class="geometry-title text-center text-4xl sm:text-5xl lg:text-6xl font-black text-white mb-2">Learn Geometry</h1>
    <p class="geometry-subtitle text-center text-lg sm:text-2xl font-black text-purple-900 mb-7 sm:mb-9">Tap a shape and hear it!</p>
    <section class="shape-grid grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4 sm:gap-6 w-full max-w-6xl mx-auto" id="shapeGrid"></section>
  </main>
  <div class="shape-modal" id="shapeModal">
    <button class="shape-close" id="shapeClose">&times;</button>
    <div class="shape-detail">
      <div id="shapePreview" class="shape circle"></div>
      <div class="shape-title" id="shapeTitle">Circle</div>
      <button class="sound-btn" id="shapeSoundBtn" aria-label="Play shape sound">
        <i class="fa-solid fa-volume-high" aria-hidden="true"></i>
      </button>
    </div>
  </div>
  <div id="footer"></div>
  <script src="js/include.js"></script>
  <script src="js/geometric.js"></script>
</body>
</html>
